# Production: API + Postgres
#
# Image (CI): ${DOCKER_USERNAME}/fpt-admission-api:latest
# Dokploy: compose file này + env trên UI
#
# Bắt buộc: DOCKER_USERNAME, JWT_SECRET, CORS_ORIGINS, POSTGRES_*
# Tùy chọn: APP_TAG, PORT, LOG_LEVEL, POSTGRES_PORT, ADMINER_PORT, SKIP_MIGRATE

name: fpt-core-prod

services:
  app:
    image: ${DOCKER_USERNAME}/fpt-admission-api:${APP_TAG:-latest}
    pull_policy: always
    container_name: fpt-api-prod
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: ${PORT:-2222}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:${POSTGRES_PORT:-1111}/${POSTGRES_DB}
      JWT_SECRET: ${JWT_SECRET}
      CORS_ORIGINS: ${CORS_ORIGINS}
      SKIP_MIGRATE: ${SKIP_MIGRATE:-0}
      MIGRATE_RETRIES: ${MIGRATE_RETRIES:-10}
    ports:
      - "${PORT:-2222}:${PORT:-2222}"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "curl -f http://localhost:$${PORT:-2222}/health || exit 1",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - fpt-net-prod

  postgres:
    image: postgres:17-alpine
    container_name: fpt-postgres-prod
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      PGDATA: /var/lib/postgresql/data/pgdata
      PGPORT: ${POSTGRES_PORT:-1111}
    volumes:
      - fpt-postgres-data-prod:/var/lib/postgresql/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -p ${POSTGRES_PORT:-1111} -U ${POSTGRES_USER} -d ${POSTGRES_DB}",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - fpt-net-prod

  adminer:
    image: adminer:4
    container_name: fpt-adminer-prod
    restart: unless-stopped
    environment:
      ADMINER_DEFAULT_SERVER: postgres:${POSTGRES_PORT:-1111}
    ports:
      - "${ADMINER_PORT:-4444}:8080"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - fpt-net-prod

networks:
  fpt-net-prod:
    name: fpt-net-prod
    driver: bridge

volumes:
  fpt-postgres-data-prod:
    name: fpt-postgres-data-prod
