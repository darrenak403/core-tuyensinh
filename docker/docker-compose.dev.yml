# Dev: PostgreSQL + Adminer. API trên host: task dev (không build/push image — CI làm)

name: fpt-core-dev

services:
  postgres:
    image: postgres:17-alpine
    container_name: fpt-postgres-dev
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-fpt_admission_dev}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      PGPORT: ${POSTGRES_PORT:-1111}
    ports:
      - "${POSTGRES_PORT:-1111}:${POSTGRES_PORT:-1111}"
    volumes:
      - fpt-postgres-data-dev:/var/lib/postgresql/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -p ${POSTGRES_PORT:-1111} -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-fpt_admission_dev}",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - fpt-net-dev

  adminer:
    image: adminer:4
    container_name: fpt-adminer-dev
    restart: unless-stopped
    environment:
      ADMINER_DEFAULT_SERVER: postgres:1111
    ports:
      - "${ADMINER_PORT:-4444}:8080"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - fpt-net-dev

networks:
  fpt-net-dev:
    name: fpt-net-dev
    driver: bridge

volumes:
  fpt-postgres-data-dev:
    name: fpt-postgres-data-dev
