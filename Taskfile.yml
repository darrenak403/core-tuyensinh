# Dev local only — API: task dev. Image Docker: GitHub Actions → Dokploy
version: "3"

vars:
  COMPOSE: docker/docker-compose.dev.yml
  ENV: docker/.env

tasks:
  default:
    desc: Danh sach lenh
    cmds:
      - task --list

  setup:
    desc: Lan dau - bun install, docker/.env, Postgres, migration + seed
    dotenv:
      - "{{.ENV}}"
    cmds:
      - bun install
      - test -f {{.ENV}} || cp docker/.env.example {{.ENV}}
      - docker compose -f {{.COMPOSE}} --env-file {{.ENV}} up -d --wait
      - bun run src/database/migrate.ts
      - echo "Xong. Chay task dev"

  up:
    desc: Bat Postgres :1111 + Adminer :4444
    aliases: [services:up, services-up]
    cmds:
      - docker compose -f {{.COMPOSE}} --env-file {{.ENV}} up -d --wait

  down:
    desc: Tat Postgres va Adminer
    aliases: [services:down, services-down]
    cmds:
      - docker compose -f {{.COMPOSE}} --env-file {{.ENV}} down

  clear:
    desc: Xoa het container + volume Postgres/Adminer (mat toan bo data DB)
    aliases: [clean]
    cmds:
      - docker compose -f {{.COMPOSE}} --env-file {{.ENV}} down -v --remove-orphans
      - echo "Da xoa stack dev. Chay task setup && task db de tao lai."

  dev:
    desc: Chay API hot-reload port 2222
    dotenv:
      - "{{.ENV}}"
    preconditions:
      - sh: test -f {{.ENV}}
        msg: "Chay task setup truoc"
    cmds:
      - bun run --watch src/index.ts

  test:
    desc: Chay tests
    cmds:
      - bun test

  fix:
    desc: Lint format typecheck
    cmds:
      - bunx biome check --write .
      - bunx tsc --noEmit

  db:
    desc: Migration schema + seed (bo qua seed neu da co data)
    aliases: [db:setup, db-setup, db:migrate]
    dotenv:
      - "{{.ENV}}"
    cmds:
      - bun run src/database/migrate.ts

  db:reset:
    desc: Xoa schema, migration + seed lai
    aliases: [db:rebuild, db-rebuild]
    dotenv:
      - "{{.ENV}}"
    cmds:
      - bun run src/database/migrate.ts --reset --yes
