# Dev local only — VPS dùng Dokploy + Docker image
version: "3"

vars:
  COMPOSE: docker/docker-compose.dev.yml
  ENV: docker/.env

tasks:
  default:
    desc: Danh sach lenh
    cmds:
      - task --list

  setup:
    desc: Lan dau - bun install, docker/.env, Postgres
    cmds:
      - bun install
      - test -f {{.ENV}} || cp docker/.env.example {{.ENV}}
      - docker compose -f {{.COMPOSE}} --env-file {{.ENV}} up -d --wait
      - echo "Xong. Chay task db (neu can data) roi task dev"

  up:
    desc: Bat Postgres port 1111
    aliases: [services:up, services-up]
    cmds:
      - docker compose -f {{.COMPOSE}} --env-file {{.ENV}} up -d --wait

  down:
    desc: Tat Postgres
    aliases: [services:down, services-down]
    cmds:
      - docker compose -f {{.COMPOSE}} down

  dev:
    desc: Chay API hot-reload port 2222
    dotenv:
      - "{{.ENV}}"
    preconditions:
      - sh: test -f {{.ENV}}
        msg: "Chay task setup truoc"
    cmds:
      - bun run --watch src/index.ts

  test:
    desc: Chay tests
    cmds:
      - bun test

  fix:
    desc: Lint format typecheck
    cmds:
      - bunx biome check --write .
      - bunx tsc --noEmit

  db:
    desc: Schema va seed
    aliases: [db:setup, db-setup]
    dotenv:
      - "{{.ENV}}"
    cmds:
      - ./scripts/db-init.sh
      - ./scripts/db-seed.sh

  db:reset:
    desc: Xoa DB schema seed lai
    aliases: [db:rebuild, db-rebuild]
    dotenv:
      - "{{.ENV}}"
    cmds:
      - ./scripts/db-rebuild.sh
